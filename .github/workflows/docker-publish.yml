name: Docker CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - Dockerfile
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - Dockerfile

env:
  DOCKER_IMAGE: hellqvio/opensearch-s3

permissions:
  contents: write

jobs:
  check_version_change:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version_changed.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract OpenSearch Version
        id: version
        run: |
          VERSION=$(grep -oP '(?<=FROM opensearchproject/opensearch:)[0-9]+\.[0-9]+\.[0-9]+' Dockerfile)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Detect version change
        id: version_changed
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_VERSION="${{ steps.version.outputs.version }}"
          PREVIOUS_VERSION=""

          if [[ "${{ github.event_name }}" == "push" ]]; then
            BEFORE_SHA="${{ github.event.before }}"
            if [[ -n "$BEFORE_SHA" ]] && git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
              PREVIOUS_VERSION=$(git show "${BEFORE_SHA}:Dockerfile" 2>/dev/null | grep -oP '(?<=FROM opensearchproject/opensearch:)[0-9]+\.[0-9]+\.[0-9]+' || true)
            fi
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_REF="origin/${{ github.base_ref }}"
            git fetch origin "${{ github.base_ref }}" --depth=1
            PREVIOUS_VERSION=$(git show "${BASE_REF}:Dockerfile" 2>/dev/null | grep -oP '(?<=FROM opensearchproject/opensearch:)[0-9]+\.[0-9]+\.[0-9]+' || true)
          fi

          if [[ -z "$PREVIOUS_VERSION" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$CURRENT_VERSION" == "$PREVIOUS_VERSION" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  build_and_push:
    needs: check_version_change
    if: needs.check_version_change.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        # Only log in if not a PR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ needs.check_version_change.outputs.version }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max

      - name: Create GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check_version_change.outputs.version }}
          name: Release ${{ env.VERSION }}
          body: Automated release for OpenSearch version ${{ env.VERSION }} with S3 plugin.
          target_commitish: ${{ github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
